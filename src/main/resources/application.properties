spring.application.name=taskflow

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:taskflow_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Madrid
spring.datasource.username=${DB_USER:taskflow_user}
spring.datasource.password=${DB_PASSWORD:taskflow_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:REEMPLAZA_ESTO_POR_UN_SECRET_BASE64_LARGO}
app.jwt.expiration=${JWT_EXPIRATION:86400000}