spring.application.name=taskflow

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:taskflow_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=${APP_TIMEZONE:Europe/Madrid}
spring.datasource.username=${DB_USER:taskflow_user}
spring.datasource.password=${DB_PASSWORD:taskflow_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:VGFza0Zsb3dEZXZTYWZlU2VjcmV0S2V5Rm9ySldUMTIzNDU2Nzg5MEFCQ0RFRg==}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

app.timezone=${APP_TIMEZONE:Europe/Madrid}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

app.email.provider=${EMAIL_PROVIDER:log}
app.email.from=${EMAIL_FROM:noreply@taskflow.local}
app.email.sendgrid.api-key=${SENDGRID_API_KEY:}
app.email.sendgrid.base-url=${SENDGRID_BASE_URL:https://api.sendgrid.com/v3}

app.notifications.reminders.enabled=${TASK_REMINDERS_ENABLED:true}
app.notifications.reminders.cron=${TASK_REMINDERS_CRON:0 */15 * * * *}
app.notifications.reminders.soon-threshold=${TASK_REMINDERS_SOON_THRESHOLD:PT24H}
app.notifications.reminders.overdue-window=${TASK_REMINDERS_OVERDUE_WINDOW:PT20M}
