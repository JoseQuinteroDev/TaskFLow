@if (fullPage) {
    <div class="loading-page">
        <div class="spinner" [style.width.px]="size" [style.height.px]="size"></div>
        @if (message) {
            <p class="loading-msg">{{ message }}</p>
        }
    </div>
} @else {
    <div class="spinner" [style.width.px]="size" [style.height.px]="size"></div>
}
