@if (fullPage) {
    <div class="loading-panel loading-page" [style.--spinner-size]="size + 'px'">
        <div class="spinner"></div>
        @if (message) {
            <p class="loading-msg">{{ message }}</p>
        }
    </div>
} @else {
    <div class="loading-inline" [style.--spinner-size]="size + 'px'">
        <div class="spinner"></div>
        @if (message) {
            <p class="loading-msg">{{ message }}</p>
        }
    </div>
}
