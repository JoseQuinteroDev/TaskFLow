<div class="dialog-backdrop" (click)="cancelled.emit()">
    <div class="dialog" (click)="$event.stopPropagation()">
        <div class="dialog__icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
        </div>

        <div class="dialog__content">
            <h3>{{ title }}</h3>
            <p>{{ message }}</p>
        </div>

        <div class="dialog__actions">
            <button class="btn btn-secondary" type="button" (click)="cancelled.emit()">Cancelar</button>
            <button class="btn btn-danger" type="button" (click)="confirmed.emit()">{{ confirmLabel }}</button>
        </div>
    </div>
</div>
