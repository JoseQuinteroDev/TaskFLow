<div class="page-wrapper">
    <div class="page-header">
        <div>
            <h1 class="page-header__title">Mis tareas</h1>
            <p class="page-header__subtitle">{{ totalLabel() }}</p>
        </div>

        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <select class="sort-select" (change)="onSort($event)">
                <option value="fechaCreacion">Más recientes</option>
                <option value="fechaLimite">Fecha límite</option>
                <option value="prioridad">Prioridad</option>
                <option value="titulo">Título A-Z</option>
            </select>

            <div class="view-toggle">
                <button class="view-btn" [class.active]="viewMode() === 'grid'" (click)="viewMode.set('grid')" title="Vista cuadrícula">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                </button>

                <button class="view-btn" [class.active]="viewMode() === 'list'" (click)="viewMode.set('list')" title="Vista lista">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"/>
                        <line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/>
                        <line x1="3" y1="12" x2="3.01" y2="12"/>
                        <line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                </button>
            </div>

            <a routerLink="/tareas/nueva" class="btn btn-primary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Nueva tarea
            </a>
        </div>
    </div>

    <app-tarea-filtros
            [categorias]="categorias()"
            (filtrosChange)="onFiltrosChange($event)"
    />

    <div class="estado-tabs">
        @for (tab of estadoTabs; track tab.value) {
            <button
                    class="estado-tab"
                    [class.active]="activeTab() === tab.value"
                    (click)="setTab(tab.value)"
            >
                {{ tab.label }}
                <span class="tab-count">{{ countByEstado(tab.value) }}</span>
            </button>
        }
    </div>

    @if (loading()) {
        <app-loading [fullPage]="true" message="Cargando tareas..." />
    } @else if (visibleTareas().length === 0) {
        <app-empty-state
                [title]="emptyTitle()"
                [description]="emptyDesc()"
                icon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
        >
            <a routerLink="/tareas/nueva" class="btn btn-primary btn-sm" style="margin-top:8px">
                Crear primera tarea
            </a>
        </app-empty-state>
    } @else {
        <div [class]="viewMode() === 'grid' ? 'tareas-grid stagger-children' : 'tareas-list stagger-children'">
            @for (tarea of visibleTareas(); track tarea.id) {
                <app-tarea-card
                        [tarea]="tarea"
                        (completar)="onCompletar($event)"
                        (eliminar)="onEliminar($event)"
                />
            }
        </div>
    }
</div>

@if (deleteId()) {
    <app-confirm-dialog
            title="Eliminar tarea"
            message="¿Seguro que quieres eliminar esta tarea? Esta acción no se puede deshacer."
            confirmLabel="Sí, eliminar"
            (confirmed)="confirmDelete()"
            (cancelled)="deleteId.set(null)"
    />
}
