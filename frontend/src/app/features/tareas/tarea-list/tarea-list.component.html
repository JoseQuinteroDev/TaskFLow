<div class="page-wrapper">
    <div class="page-header">
        <div>
            <span class="page-header__eyebrow">Task management</span>
            <h1 class="page-header__title">Mis tareas</h1>
            <p class="page-header__subtitle">{{ totalLabel() }} visibles en la vista actual.</p>
        </div>

        <div class="page-header__actions tasks-header__actions">
            <label class="sort-field">
                <span>Ordenar</span>
                <select class="form-control" (change)="onSort($event)" [value]="sortField">
                    <option value="fechaCreacion">Más recientes</option>
                    <option value="fechaLimite">Fecha límite</option>
                    <option value="prioridad">Prioridad</option>
                    <option value="titulo">Título A-Z</option>
                </select>
            </label>

            <div class="view-toggle">
                <button
                        class="view-toggle__button"
                        type="button"
                        [class.active]="viewMode() === 'grid'"
                        [attr.aria-pressed]="viewMode() === 'grid'"
                        (click)="viewMode.set('grid')"
                        title="Vista cuadrícula"
                >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                </button>

                <button
                        class="view-toggle__button"
                        type="button"
                        [class.active]="viewMode() === 'list'"
                        [attr.aria-pressed]="viewMode() === 'list'"
                        (click)="viewMode.set('list')"
                        title="Vista lista"
                >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="8" y1="6" x2="21" y2="6"/>
                        <line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/>
                        <line x1="3" y1="12" x2="3.01" y2="12"/>
                        <line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                </button>
            </div>

            <a routerLink="/tareas/nueva" class="btn btn-primary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Nueva tarea
            </a>
        </div>
    </div>

    <section class="tasks-toolbar card">
        <app-tarea-filtros
                [categorias]="categorias()"
                (filtrosChange)="onFiltrosChange($event)"
        />

        <div class="tasks-toolbar__footer">
            <div class="estado-tabs" role="tablist" aria-label="Filtrar tareas por estado">
                @for (tab of estadoTabs; track tab.value) {
                    <button
                            class="estado-tab"
                            type="button"
                            role="tab"
                            [class.active]="activeTab() === tab.value"
                            [attr.aria-selected]="activeTab() === tab.value"
                            (click)="setTab(tab.value)"
                    >
                        <span>{{ tab.label }}</span>
                        <span class="estado-tab__count">{{ countByEstado(tab.value) }}</span>
                    </button>
                }
            </div>
        </div>
    </section>

    @if (loading()) {
        <div class="loading-panel">
            <app-loading [fullPage]="false" message="Cargando tareas..." />
        </div>
    } @else if (visibleTareas().length === 0) {
        <app-empty-state [title]="emptyTitle()" [description]="emptyDesc()">
            <a routerLink="/tareas/nueva" class="btn btn-primary btn-sm">Crear tarea</a>
        </app-empty-state>
    } @else {
        <div [class]="viewMode() === 'grid' ? 'tareas-grid stagger-children' : 'tareas-list stagger-children'">
            @for (tarea of visibleTareas(); track tarea.id) {
                <app-tarea-card
                        [tarea]="tarea"
                        (completar)="onCompletar($event)"
                        (eliminar)="onEliminar($event)"
                />
            }
        </div>
    }
</div>

@if (deleteId()) {
    <app-confirm-dialog
            title="Eliminar tarea"
            message="Vas a borrar esta tarea de forma permanente. Esta acción no se puede deshacer."
            confirmLabel="Sí, eliminar"
            (confirmed)="confirmDelete()"
            (cancelled)="deleteId.set(null)"
    />
}
