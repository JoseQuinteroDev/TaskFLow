<div class="filtros-panel">
    <div class="search-wrapper">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>

        <input
                type="text"
                class="form-control search-input"
                placeholder="Buscar tareas..."
                [formControl]="form.controls.texto"
        />

        @if (form.controls.texto.value) {
            <button class="search-clear" (click)="form.controls.texto.setValue('')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        }
    </div>

    <div class="filters-row" [formGroup]="form">
        <select class="form-control-select" formControlName="estado">
            <option value="">Todos los estados</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="EN_PROCESO">En proceso</option>
            <option value="COMPLETADA">Completada</option>
        </select>

        <select class="form-control-select" formControlName="prioridad">
            <option value="">Todas las prioridades</option>
            <option value="ALTA">Alta</option>
            <option value="MEDIA">Media</option>
            <option value="BAJA">Baja</option>
        </select>

        @if (categorias.length > 0) {
            <select class="form-control-select" formControlName="categoriaId">
                <option value="">Todas las categorías</option>
                @for (cat of categorias; track cat.id) {
                    <option [value]="cat.id">{{ cat.nombre }}</option>
                }
            </select>
        }

        <input type="date" class="form-control-select" formControlName="desde" title="Desde fecha" />
        <input type="date" class="form-control-select" formControlName="hasta" title="Hasta fecha" />

        @if (hasActiveFilters()) {
            <button class="btn btn-ghost btn-sm" (click)="clearFilters()">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
                Limpiar
            </button>
        }
    </div>
</div>
