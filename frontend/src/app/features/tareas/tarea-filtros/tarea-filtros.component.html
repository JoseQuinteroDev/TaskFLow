<div class="filtros-panel">
    <div class="search-shell">
        <svg class="search-shell__icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>

        <input
                type="text"
                class="form-control search-shell__input"
                placeholder="Buscar por titulo o descripcion"
                [formControl]="form.controls.texto"
        />

        @if (form.controls.texto.value) {
            <button class="search-shell__clear" type="button" (click)="form.controls.texto.setValue('')">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        }
    </div>

    <div class="filters-row" [formGroup]="form">
        <select class="form-control" formControlName="estado">
            <option value="">Todos los estados</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="EN_PROCESO">En proceso</option>
            <option value="COMPLETADA">Completada</option>
        </select>

        <select class="form-control" formControlName="prioridad">
            <option value="">Todas las prioridades</option>
            <option value="ALTA">Alta</option>
            <option value="MEDIA">Media</option>
            <option value="BAJA">Baja</option>
        </select>

        @if (categorias.length > 0) {
            <select class="form-control" formControlName="categoriaId">
                <option value="">Todas las categorias</option>
                @for (cat of categorias; track cat.id) {
                    <option [value]="cat.id">{{ cat.nombre }}</option>
                }
            </select>
        }

        <input type="datetime-local" class="form-control" formControlName="inicioDesde" title="Inicio desde" aria-label="Inicio desde" />
        <input type="datetime-local" class="form-control" formControlName="inicioHasta" title="Inicio hasta" aria-label="Inicio hasta" />

        @if (hasActiveFilters()) {
            <button class="btn btn-ghost btn-sm filtros-panel__clear" type="button" (click)="clearFilters()">
                Limpiar filtros
            </button>
        }
    </div>
</div>
