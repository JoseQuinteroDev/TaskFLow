services:
  db:
    image: mysql:8.4
    container_name: taskflow-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: taskflow_db
      MYSQL_USER: taskflow_user
      MYSQL_PASSWORD: taskflow_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: .
    container_name: taskflow-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: taskflow_db
      DB_USER: taskflow_user
      DB_PASSWORD: taskflow_pass
      APP_TIMEZONE: Europe/Madrid
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200
      JWT_SECRET: VGFza0Zsb3dEZXZTYWZlU2VjcmV0S2V5Rm9ySldUMTIzNDU2Nzg5MEFCQ0RFRg==
      JWT_EXPIRATION: 86400000
      EMAIL_PROVIDER: log
      EMAIL_FROM: noreply@taskflow.local
      SENDGRID_API_KEY:
      TASK_REMINDERS_ENABLED: true
      TASK_REMINDERS_CRON: "0 */15 * * * *"
      TASK_REMINDERS_SOON_THRESHOLD: PT24H
      TASK_REMINDERS_OVERDUE_WINDOW: PT20M
    ports:
      - "8080:8080"

volumes:
  mysql_data:
